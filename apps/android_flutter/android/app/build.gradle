plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def releaseSigningValue = { String name ->
    def envName = "LAN_AUDIO_${name.toUpperCase().replace('.', '_')}"
    def ciEnvName = [
        releaseStoreFile: 'LAN_AUDIO_ANDROID_RELEASE_STORE_FILE',
        releaseStorePassword: 'LAN_AUDIO_ANDROID_RELEASE_STORE_PASSWORD',
        releaseKeyAlias: 'LAN_AUDIO_ANDROID_RELEASE_KEY_ALIAS',
        releaseKeyPassword: 'LAN_AUDIO_ANDROID_RELEASE_KEY_PASSWORD',
    ][name]
    return localProperties.getProperty("lanAudio.${name}") ?: System.getenv(ciEnvName ?: envName) ?: System.getenv(envName)
}

def releaseSigningConfigured = {
    return releaseSigningValue('releaseStoreFile') &&
        releaseSigningValue('releaseStorePassword') &&
        releaseSigningValue('releaseKeyAlias') &&
        releaseSigningValue('releaseKeyPassword')
}

if (gradle.startParameter.taskNames.any { it.toLowerCase().contains('release') } &&
    !releaseSigningConfigured()) {
    throw new GradleException(
        'Release signing is not configured. Set lanAudio.releaseStoreFile / lanAudio.releaseStorePassword / lanAudio.releaseKeyAlias / lanAudio.releaseKeyPassword in android/local.properties, or LAN_AUDIO_ANDROID_RELEASE_STORE_FILE / LAN_AUDIO_ANDROID_RELEASE_STORE_PASSWORD / LAN_AUDIO_ANDROID_RELEASE_KEY_ALIAS / LAN_AUDIO_ANDROID_RELEASE_KEY_PASSWORD in CI.'
    )
}

android {
    namespace 'com.example.lan_audio_android_mvp'
    compileSdk flutter.compileSdkVersion
    ndkVersion '25.1.8937393'

    defaultConfig {
        applicationId 'com.example.lan_audio_android_mvp'
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging false
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    signingConfigs {
        release {
            def releaseStoreFile = releaseSigningValue('releaseStoreFile')
            def releaseStorePassword = releaseSigningValue('releaseStorePassword')
            def releaseKeyAlias = releaseSigningValue('releaseKeyAlias')
            def releaseKeyPassword = releaseSigningValue('releaseKeyPassword')
            if (releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

tasks.matching { it.name.toLowerCase().contains('release') }.configureEach {
    doFirst {
        if (!android.signingConfigs.release.storeFile) {
            throw new GradleException(
                'Release signing is not configured. Set lanAudio.releaseStoreFile / lanAudio.releaseStorePassword / lanAudio.releaseKeyAlias / lanAudio.releaseKeyPassword in android/local.properties, or LAN_AUDIO_ANDROID_RELEASE_STORE_FILE / LAN_AUDIO_ANDROID_RELEASE_STORE_PASSWORD / LAN_AUDIO_ANDROID_RELEASE_KEY_ALIAS / LAN_AUDIO_ANDROID_RELEASE_KEY_PASSWORD in CI.'
            )
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.core:core:1.13.1"
    implementation "androidx.media:media:1.7.0"
    implementation "androidx.media3:media3-session:1.4.1"
    implementation "androidx.media3:media3-exoplayer:1.4.1"
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
