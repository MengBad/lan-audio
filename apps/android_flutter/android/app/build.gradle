plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

android {
    namespace 'com.example.lan_audio_android_mvp'
    compileSdk flutter.compileSdkVersion
    ndkVersion '25.1.8937393'

    defaultConfig {
        applicationId 'com.example.lan_audio_android_mvp'
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging false
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("LAN_AUDIO_KEYSTORE_PATH") ?: rootProject.file("../../lan-audio-release.jks"))
            storePassword System.getenv("LAN_AUDIO_KEYSTORE_PASS") ?: ""
            keyAlias System.getenv("LAN_AUDIO_KEY_ALIAS") ?: "lan-audio"
            keyPassword System.getenv("LAN_AUDIO_KEY_PASS") ?: ""
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.core:core:1.13.1"
    implementation "androidx.media:media:1.7.0"
    implementation "androidx.media3:media3-session:1.4.1"
    implementation "androidx.media3:media3-exoplayer:1.4.1"
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
