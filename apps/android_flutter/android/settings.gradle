pluginManagement {
    def props = new Properties()
    def localProps = file("local.properties")
    if (localProps.exists()) {
        localProps.withInputStream { props.load(it) }
    }

    def flutterSdkPath = props.getProperty("flutter.sdk")
    if (flutterSdkPath == null || flutterSdkPath.trim().isEmpty()) {
        flutterSdkPath = System.getenv("FLUTTER_ROOT")
    }

    if (flutterSdkPath == null || flutterSdkPath.trim().isEmpty()) {
        throw new GradleException("Flutter SDK path not found. Set flutter.sdk in android/local.properties or FLUTTER_ROOT env.")
    }

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ':app'