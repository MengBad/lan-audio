name: lan_audio_android_mvp
description: LAN Audio Android debug client MVP.
publish_to: "none"
version: 1.5.0+2010500
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  mobile_scanner: 5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/dm_sans/DMSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/dm_sans/DMSans-Variable.ttf
          weight: 500
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/ibm_plex_mono/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/ibm_plex_mono/IBMPlexMono-Medium.ttf
          weight: 500
