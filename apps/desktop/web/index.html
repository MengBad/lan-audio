<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAN Audio Desktop Console</title>
    <style>
      :root {
        --bg: #0c0f14;
        --bg2: #131720;
        --panel: #1e2433;
        --panel2: #252b3b;
        --text: #f0f2f7;
        --muted: #8892a4;
        --faint: #4a5568;
        --line: rgba(255,255,255,0.09);
        --line-strong: rgba(255,255,255,0.14);
        --accent: #00d4aa;
        --accent-dim: rgba(0,212,170,0.12);
        --ok: #00d4aa;
        --warn: #f59e0b;
        --error: #ef4444;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0,212,170,0.10), transparent 32%),
          var(--bg);
        color: var(--text);
      }

      .app {
        max-width: 1040px;
        margin: 22px auto;
        padding: 0 18px 22px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .title {
        margin: 0;
        font-size: 23px;
        font-weight: 700;
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .lang-toggle {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 7px 10px;
        color: var(--text);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 16px;
        box-shadow: 0 16px 42px rgba(0,0,0,0.22);
      }

      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #8a98a8;
        box-shadow: 0 0 18px currentColor;
      }

      .status-dot.running { background: var(--ok); }
      .status-dot.error { background: var(--error); }
      .status-dot.busy { background: var(--warn); }

      .status-sub {
        color: var(--muted);
        font-size: 13px;
      }

      .main-control {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .primary {
        border: 0;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        padding: 11px 26px;
        background: var(--accent);
        color: #07110f;
        cursor: pointer;
      }

      .primary.stop {
        background: var(--error);
        color: #fff;
      }

      .primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .health-strip {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .health-title {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        font-weight: 600;
      }

      .health-items {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 13px;
      }

      .health-item {
        color: var(--text);
      }

      .health-label {
        color: var(--muted);
        margin-right: 6px;
      }

      .layout {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
      }

      .source-picker {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .source-btn {
        border: 1px solid var(--line);
        background: var(--bg2);
        color: var(--text);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .source-btn.active {
        border-color: rgba(0,212,170,0.40);
        background: var(--accent-dim);
        color: var(--accent);
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        color: var(--text);
        font-size: 14px;
      }

      .plain-list {
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        grid-template-columns: 116px 1fr;
        gap: 8px;
        align-items: baseline;
        font-size: 13px;
      }

      .row .label { color: var(--muted); }
      .row .value { word-break: break-word; }

      .address-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .address-value {
        word-break: break-word;
      }

      .copy-btn {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--bg2);
        color: var(--text);
        padding: 4px 9px;
        font-size: 12px;
        cursor: pointer;
      }

      .copy-btn:hover {
        border-color: var(--line-strong);
      }

      .device-block {
        margin-top: 10px;
      }

      .device-subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 5px;
      }

      .device-current {
        font-size: 13px;
        font-weight: 600;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 8px;
      }

      .device-recent {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 6px;
      }

      .device-recent li {
        font-size: 13px;
        color: var(--text);
      }

      .usb-panel {
        margin-top: 10px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .usb-actions {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      .usb-device-list {
        display: grid;
        gap: 6px;
      }

      .usb-device {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }

      .usb-meta {
        color: var(--muted);
      }

      details {
        margin-top: 12px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
      }

      summary {
        padding: 12px 0;
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
      }

      .debug-groups {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 12px;
      }

      .group-title {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 700;
      }

      .kv {
        font-size: 12px;
        line-height: 1.5;
      }

      .kv div { margin-bottom: 3px; }

      .log-pane {
        max-height: 220px;
        overflow: auto;
        border-top: 1px solid var(--line);
        padding: 9px 0 12px;
        font-family: Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .log-line {
        white-space: pre-wrap;
        margin-bottom: 4px;
      }

      .error-text {
        margin-top: 8px;
        color: var(--error);
        font-size: 13px;
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .debug-groups { grid-template-columns: 1fr; }
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1 class="title" id="title"></h1>
          <div class="sub" id="subtitle"></div>
        </div>
        <select class="lang-toggle" id="langSelect">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </header>

      <section class="panel">
        <div id="updateBanner" class="status-sub" style="display:none; margin-bottom: 8px;">
          <span id="updateBannerText"></span>
          <button class="copy-btn" id="updateBannerBtn" type="button" style="margin-left: 10px;"></button>
        </div>
        <div class="status-line">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusHeadline"></span>
        </div>
        <div class="status-sub" id="statusSubline"></div>
        <div class="main-control">
          <button id="primaryActionBtn" class="primary"></button>
          <div class="hint" id="nextStep"></div>
        </div>
        <div class="health-strip">
          <div class="health-title" id="healthTitle"></div>
          <div class="health-items">
            <div class="health-item"><span class="health-label" id="healthStreamLabel"></span><span id="healthStreamValue"></span></div>
            <div class="health-item"><span class="health-label" id="healthDevicesLabel"></span><span id="healthDevicesValue"></span></div>
            <div class="health-item"><span class="health-label" id="healthSourceLabel"></span><span id="healthSourceValue"></span></div>
          </div>
        </div>
        <div class="error-text" id="errorText"></div>
      </section>

      <div class="layout">
        <section class="panel">
          <h2 class="section-title" id="sourceTitle"></h2>
          <div class="source-picker">
            <button id="sourceLoopback" class="source-btn"></button>
            <button id="sourceSynthetic" class="source-btn"></button>
          </div>
          <div class="device-subtitle" id="dataPlaneTitle"></div>
          <div class="source-picker">
            <button id="dataPlaneLegacy" class="source-btn"></button>
            <button id="dataPlaneV2Header" class="source-btn"></button>
          </div>
          <div class="device-subtitle" id="codecTitle"></div>
          <div class="source-picker">
            <button id="codecPcm16" class="source-btn"></button>
            <button id="codecOpus" class="source-btn"></button>
          </div>
          <label class="toggle">
            <input type="checkbox" id="fallbackToggle" />
            <span id="fallbackLabel"></span>
          </label>
          <label class="toggle">
            <button class="copy-btn" id="safeModeBtn" type="button"></button>
            <span id="safeModeHint"></span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="dumpToggle" />
            <span id="dumpLabel"></span>
          </label>
        </section>

        <section class="panel">
          <h2 class="section-title" id="deviceTitle"></h2>
          <div class="plain-list">
            <div class="row">
              <span class="label" id="addrLabel"></span>
              <div class="address-actions">
                <span class="address-value" id="addrValue"></span>
                <button class="copy-btn" id="copyAddrBtn" type="button"></button>
              </div>
            </div>
            <div class="row"><span class="label" id="sessionLabel"></span><span class="value" id="sessionValue"></span></div>
            <div class="row"><span class="label" id="sourceLabel"></span><span class="value" id="sourceValue"></span></div>
            <div class="row"><span class="label" id="dataPlaneLabel"></span><span class="value" id="dataPlaneValue"></span></div>
            <div class="row"><span class="label" id="modeLabel"></span><span class="value" id="modeValue"></span></div>
            <div class="row"><span class="label" id="strategyLabel"></span><span class="value" id="strategyValue"></span></div>
            <div class="row"><span class="label" id="codecLabel"></span><span class="value" id="codecValue"></span></div>
            <div class="row"><span class="label" id="grayLabel"></span><span class="value" id="grayValue"></span></div>
            <div class="row"><span class="label" id="connectionTipLabel"></span><span class="value" id="connectionTipValue"></span></div>
            <div class="row"><span class="label" id="protocolLabel"></span><span class="value" id="protocolValue"></span></div>
            <div class="row"><span class="label" id="versionLabel"></span><span class="value" id="versionValue"></span></div>
          </div>

          <div class="device-block">
            <div class="device-subtitle" id="currentDeviceLabel"></div>
            <div class="device-current" id="currentDeviceValue"></div>
          </div>

          <div class="device-block">
            <div class="device-subtitle" id="recentDeviceLabel"></div>
            <ul class="device-recent" id="deviceRecentList"></ul>
          </div>

          <div class="usb-panel">
            <div class="device-subtitle" id="usbTitle"></div>
            <div class="usb-actions">
              <button class="copy-btn" id="usbRefreshBtn" type="button"></button>
              <button class="copy-btn" id="usbDisableBtn" type="button"></button>
            </div>
            <div class="row">
              <span class="label" id="usbStateLabel"></span>
              <span class="value" id="usbStateValue"></span>
            </div>
            <div class="row">
              <span class="label" id="usbForwardLabel"></span>
              <span class="value" id="usbForwardValue"></span>
            </div>
            <div class="usb-device-list" id="usbDeviceList"></div>
          </div>
        </section>
      </div>

      <details>
        <summary id="debugSummary"></summary>
        <div class="debug-groups">
          <div>
            <div class="group-title" id="groupTx"></div>
            <div class="kv" id="debugTx"></div>
          </div>
          <div>
            <div class="group-title" id="groupCapture"></div>
            <div class="kv" id="debugCapture"></div>
          </div>
          <div>
            <div class="group-title" id="groupStatus"></div>
            <div class="kv" id="debugState"></div>
          </div>
        </div>
      </details>

      <details>
        <summary id="advancedSummary"></summary>
        <div class="plain-list" style="margin-bottom: 12px;">
          <div class="row"><span class="label" id="advancedPathLabel"></span><span class="value" id="advancedDataPathValue"></span></div>
          <div class="row">
            <span class="label" id="advancedRollbackLabel"></span>
            <button class="copy-btn" id="advancedSafeModeBtn" type="button"></button>
          </div>
          <div class="row">
            <span class="label" id="advancedExportLabel"></span>
            <button class="copy-btn" id="exportDiagBtn" type="button"></button>
          </div>
        </div>
      </details>

      <details>
        <summary id="logSummary"></summary>
        <div class="log-pane" id="logPane"></div>
      </details>
    </div>

          subStopped: 'Service is offline. Phone cannot connect yet.',
          subError: 'Service has an error. Check logs and restart.',
          nextStart: 'Next: click Start Service, then connect from your phone.',
          nextStop: 'Streaming service is available. You can stop it anytime.',
          debugSummary: 'Debug Metrics (collapsed by default)',
          logSummary: 'Runtime Logs (collapsed by default)',
          groupTx: 'Sending',
          groupCapture: 'Capture',
          groupStatus: 'State',
          sentPackets: 'Sent packets',
          sentBytes: 'Sent bytes',
          activeSessions: 'Active sessions',
          captureState: 'Capture state',
          captureFrames: 'Captured frames',
          captureErrors: 'Capture errors',
          captureUnderruns: 'Capture underruns',
          bufferedMs: 'Buffered ms',
          latePackets: 'Late packets',
          droppedPackets: 'Dropped packets',
          rttMs: 'RTT (ms)',
          reconnectCount: 'Reconnect count',
          decodeErrors: 'Decode errors',
          sinkWriteGap: 'Sink write gap P95',
          capturePeak: 'Peak',
          captureRms: 'RMS',
          serviceStatus: 'Service status',
          sessionStatus: 'Session status',
          audioSource: 'Audio source',
          captureDevice: 'Capture device',
          sampleRate: 'Sample rate',
          channels: 'Channels',
          usbTitle: 'USB Mode (adb)',
          usbRefresh: 'Refresh Devices',
          usbDisable: 'Disable USB',
          usbEnable: 'Enable USB',
          usbState: 'USB Status',
          usbForward: 'Forward Ports',
          usbStateOn: 'USB connected · {serial}',
          usbStateOff: 'Disabled (Wi-Fi)',
          usbNoDevices: 'No online adb devices detected'
        }
      };

      const state = {
        lang: navigator.language && navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en',
        snapshot: null,
        busy: false,
        adbDevices: [],
        lastAdbRefreshAt: 0,
      };

      function t(key) {
        return I18N[state.lang][key] ?? key;
      }

      function trf(key, values) {
        let text = t(key);
        Object.entries(values).forEach(([k, v]) => {
          text = text.replace(`{${k}}`, String(v));
        });
        return text;
      }

      function tauriInvoke(command, payload) {
        const tauri = window.__TAURI__;
        if (!tauri || !tauri.core || !tauri.core.invoke) {
          throw new Error('Tauri bridge unavailable');
        }
        return tauri.core.invoke(command, payload);
      }

      function sourceName(source) {
        return t(`source_${source}`) || source;
      }

      function dataPlaneName(dataPlane) {
        return t(`data_plane_${dataPlane}`) || dataPlane;
      }

      function runtimeSnapshot(snapshot) {
        return snapshot?.service_snapshot || {};
      }

      function formatLogLine(line) {
        const m = line.match(/^\[(\d+)\]\s*(.*)$/);
        if (!m) return line;
        const ts = Number(m[1]) * 1000;
        const d = new Date(ts);
        if (!Number.isFinite(d.getTime())) return line;
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        return `[${hh}:${mm}:${ss}] ${m[2]}`;
      }

      function extractIp(entry) {
        const m = entry && entry.match(/\(([^)]+)\)$/);
        return m ? m[1] : '-';
      }

      function getMainAction(snapshot) {
        if (!snapshot) return { action: null, label: t('busy'), stop: false };
        if (state.busy || snapshot.service_status === 'starting' || snapshot.service_status === 'stopping') {
          return { action: null, label: t('busy'), stop: false };
        }
        if (snapshot.service_status === 'not_started' || snapshot.service_status === 'error') {
          return { action: 'start', label: t('start'), stop: false };
        }
        return { action: 'stop', label: t('stop'), stop: true };
      }

      function buildHeadline(snapshot) {
        const stateText = t(`state_${snapshot.service_status}`);
        if (snapshot.connected_devices > 0) {
          const ip = extractIp(snapshot.recent_clients?.[0] || '');
          return trf('headlineWithDevice', { state: stateText, count: snapshot.connected_devices, ip });
        }
        return trf('headlineNoDevice', { state: stateText });
      }

      function buildSubline(snapshot) {
        if (snapshot.transport_mode === 'usb' && snapshot.usb_serial) {
          return trf('usbStateOn', { serial: snapshot.usb_serial });
        }
        if (snapshot.service_status === 'running') return t('subRunning');
        if (snapshot.service_status === 'error') return t('subError');
        return t('subStopped');
      }

      async function refreshAdbDevices(force = false) {
        const now = Date.now();
        const shouldRefresh =
          force ||
          !state.snapshot ||
          state.snapshot.transport_mode === 'usb' ||
          now - state.lastAdbRefreshAt >= 15000;
        if (!shouldRefresh) {
          return;
        }
        try {
          state.adbDevices = await tauriInvoke('list_adb_devices');
          state.lastAdbRefreshAt = now;
        } catch {
          state.adbDevices = [];
          state.lastAdbRefreshAt = now;
        }
      }

      async function enableUsbMode(serial) {
        await call('enable_usb_mode', { serial });
      }

      async function disableUsbMode() {
        await call('disable_usb_mode');
      }

      function renderUsbPanel(snapshot) {
        document.getElementById('usbStateValue').textContent =
          snapshot.transport_mode === 'usb' && snapshot.usb_serial
            ? trf('usbStateOn', { serial: snapshot.usb_serial })
            : t('usbStateOff');
        document.getElementById('usbForwardValue').textContent =
          `ws tcp:${snapshot.ws_port} · data tcp:${snapshot.udp_port}`;

        const list = document.getElementById('usbDeviceList');
        list.innerHTML = '';
        if (!state.adbDevices || state.adbDevices.length === 0) {
          const row = document.createElement('div');
          row.className = 'usb-meta';
          row.textContent = t('usbNoDevices');
          list.appendChild(row);
          return;
        }

        state.adbDevices.forEach((device) => {
          const row = document.createElement('div');
          row.className = 'usb-device';

          const meta = document.createElement('div');
          const model = device.model ? ` · ${device.model}` : '';
          const tid = device.transport_id ? ` · tid:${device.transport_id}` : '';
          meta.innerHTML = `<strong>${device.serial}</strong><span class="usb-meta">${model}${tid}</span>`;

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'copy-btn';
          btn.textContent = t('usbEnable');
          btn.disabled = state.busy;
          btn.addEventListener('click', () => enableUsbMode(device.serial));

          row.appendChild(meta);
          row.appendChild(btn);
          list.appendChild(row);
        });
      }

      function streamHealth(snapshot) {
        const runtime = runtimeSnapshot(snapshot);
        if (snapshot.service_status === 'error') return t('healthError');
        if (snapshot.service_status !== 'running') return t('healthNotStarted');
        if (runtime.state && runtime.state !== 'streaming' && runtime.state !== 'disconnected') {
          return runtime.state;
        }
        return t('healthOk');
      }

      function renderText() {
        document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : 'en';
        document.getElementById('title').textContent = t('title');
        document.getElementById('subtitle').textContent = t('subtitle');
        document.getElementById('sourceTitle').textContent = t('sourceTitle');
        document.getElementById('dataPlaneTitle').textContent = t('dataPlaneTitle');
        document.getElementById('codecTitle').textContent = t('codecTitle');
        document.getElementById('deviceTitle').textContent = t('deviceTitle');
        document.getElementById('sourceLoopback').textContent = t('loopback');
        document.getElementById('sourceSynthetic').textContent = t('synthetic');
        document.getElementById('dataPlaneLegacy').textContent = t('legacy');
        document.getElementById('dataPlaneV2Header').textContent = t('v2Header');
        document.getElementById('codecPcm16').textContent = t('pcm16');
        document.getElementById('codecOpus').textContent = t('opusExperimental');
        document.getElementById('fallbackLabel').textContent = t('fallback');
        document.getElementById('safeModeHint').textContent = t('safeModeHint');
        document.getElementById('dumpLabel').textContent = t('dump');
        document.getElementById('exportDiagBtn').textContent = t('exportDiag');
        document.getElementById('updateBannerBtn').textContent = t('updateBannerBtn');
        document.getElementById('addrLabel').textContent = t('address');
        document.getElementById('copyAddrBtn').textContent = t('copy');
        document.getElementById('sessionLabel').textContent = t('session');
        document.getElementById('sourceLabel').textContent = t('source');
        document.getElementById('dataPlaneLabel').textContent = t('dataPlane');
        document.getElementById('modeLabel').textContent = t('mode');
        document.getElementById('strategyLabel').textContent = t('strategy');
        document.getElementById('codecLabel').textContent = t('codec');
        document.getElementById('grayLabel').textContent = t('grayMode');
        document.getElementById('connectionTipLabel').textContent = t('recommendedConnection');
        document.getElementById('protocolLabel').textContent = t('protocol');
        document.getElementById('versionLabel').textContent = t('version');
        document.getElementById('currentDeviceLabel').textContent = t('currentDevice');
        document.getElementById('recentDeviceLabel').textContent = t('recentDevice');
        document.getElementById('usbTitle').textContent = t('usbTitle');
        document.getElementById('usbRefreshBtn').textContent = t('usbRefresh');
        document.getElementById('usbDisableBtn').textContent = t('usbDisable');
        document.getElementById('usbStateLabel').textContent = t('usbState');
        document.getElementById('usbForwardLabel').textContent = t('usbForward');
        document.getElementById('healthTitle').textContent = t('healthTitle');
        document.getElementById('healthStreamLabel').textContent = `${t('healthStream')}:`;
        document.getElementById('healthDevicesLabel').textContent = `${t('healthDevices')}:`;
        document.getElementById('healthSourceLabel').textContent = `${t('healthSource')}:`;
        document.getElementById('debugSummary').textContent = t('debugSummary');
        document.getElementById('advancedSummary').textContent = t('advancedSummary');
        document.getElementById('advancedPathLabel').textContent = t('advancedPath');
        document.getElementById('advancedRollbackLabel').textContent = t('advancedRollback');
        document.getElementById('advancedExportLabel').textContent = t('advancedExport');
        document.getElementById('logSummary').textContent = t('logSummary');
        document.getElementById('groupTx').textContent = t('groupTx');
        document.getElementById('groupCapture').textContent = t('groupCapture');
        document.getElementById('groupStatus').textContent = t('groupStatus');
      }

      function renderSnapshot(snapshot) {
        state.snapshot = snapshot;
        const runtime = runtimeSnapshot(snapshot);
        const runtimeMetrics = runtime.metrics || {};
        const main = getMainAction(snapshot);
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot';
        if (snapshot.service_status === 'running') dot.classList.add('running');
        else if (snapshot.service_status === 'error') dot.classList.add('error');
        else if (snapshot.service_status === 'starting' || snapshot.service_status === 'stopping') dot.classList.add('busy');

        document.getElementById('statusHeadline').textContent = buildHeadline(snapshot);
        document.getElementById('statusSubline').textContent = buildSubline(snapshot);
        document.getElementById('nextStep').textContent = main.action === 'start' ? t('nextStart') : t('nextStop');

        const primary = document.getElementById('primaryActionBtn');
        primary.textContent = main.label;
        primary.disabled = !main.action;
        primary.className = `primary${main.stop ? ' stop' : ''}`;
        primary.dataset.action = main.action || '';

        document.getElementById('healthStreamValue').textContent = streamHealth(snapshot);
        document.getElementById('healthDevicesValue').textContent = String(snapshot.connected_devices);
        document.getElementById('healthSourceValue').textContent = sourceName(snapshot.audio_source);

        document.getElementById('addrValue').textContent = snapshot.connect_address;
        document.getElementById('sessionValue').textContent = t(`session_${runtime.state}`) || runtime.state || snapshot.session_status;
        document.getElementById('sourceValue').textContent = sourceName(snapshot.audio_source);
        document.getElementById('dataPlaneValue').textContent = dataPlaneName(runtime.data_plane || snapshot.data_plane_format);
        document.getElementById('modeValue').textContent = runtime.mode || snapshot.current_audio_mode || 'balanced';
        document.getElementById('strategyValue').textContent =
          `${snapshot.mode_profile?.start_buffer_ms ?? '-'}-${snapshot.mode_profile?.max_buffer_ms ?? '-'} ms · ` +
          `batch ${snapshot.mode_profile?.batch_frames ?? '-'}`;
        const isSafeMode = runtime.rollback_state === 'forced_legacy_las1_pcm16';
        const codecText = snapshot.codec_selection === 'opus'
          ? ((runtime.effective_codec || snapshot.effective_codec) === 'opus'
            ? `${runtime.effective_codec || snapshot.effective_codec} · ${t('codecExperimentalActive')}`
            : `${runtime.effective_codec || snapshot.effective_codec} · ${t('codecFallback')}`)
          : (runtime.effective_codec || snapshot.effective_codec);
        document.getElementById('codecValue').textContent = codecText;
        document.getElementById('grayValue').textContent = runtime.rollback_state || (isSafeMode ? t('grayOff') : t('grayOn'));
        document.getElementById('connectionTipValue').textContent = snapshot.recommended_connection;
        document.getElementById('protocolValue').textContent = `v${snapshot.protocol_version}`;
        document.getElementById('versionValue').textContent = snapshot.version;
        document.getElementById('errorText').textContent = snapshot.error_message || '';
        const banner = document.getElementById('updateBanner');
        if (snapshot.update_banner?.latest_version) {
          banner.style.display = 'block';
          document.getElementById('updateBannerText').textContent =
            trf('updateBannerText', { version: snapshot.update_banner.latest_version });
        } else {
          banner.style.display = 'none';
          document.getElementById('updateBannerText').textContent = '';
        }

        document.getElementById('sourceLoopback').classList.toggle('active', snapshot.audio_source === 'windows_loopback');
        document.getElementById('sourceSynthetic').classList.toggle('active', snapshot.audio_source === 'synthetic');
        document.getElementById('dataPlaneLegacy').classList.toggle('active', snapshot.data_plane_format === 'legacy_las1');
        document.getElementById('dataPlaneV2Header').classList.toggle('active', snapshot.data_plane_format === 'v2_header');
        document.getElementById('codecPcm16').classList.toggle('active', snapshot.codec_selection === 'pcm16');
        document.getElementById('codecOpus').classList.toggle('active', snapshot.codec_selection === 'opus');
        document.getElementById('fallbackToggle').checked = snapshot.fallback_to_synthetic;
        document.getElementById('dumpToggle').checked = snapshot.capture_dump_wav;
        const safeModeBtn = document.getElementById('safeModeBtn');
        safeModeBtn.textContent = isSafeMode ? t('safeModeDisable') : t('safeModeEnable');
        safeModeBtn.title = t('safeModeHint');
        const advancedSafeModeBtn = document.getElementById('advancedSafeModeBtn');
        advancedSafeModeBtn.textContent = isSafeMode ? t('safeModeDisable') : t('safeModeEnable');
        advancedSafeModeBtn.title = t('safeModeHint');
        document.getElementById('advancedDataPathValue').textContent =
          `${snapshot.audio_source} + ${runtime.data_plane || snapshot.data_plane_format} + ${runtime.effective_codec || snapshot.effective_codec}`;

        const recent = snapshot.recent_clients || [];
        const currentDevice = snapshot.connected_devices > 0 && recent.length > 0 ? recent[0] : t('noDevice');
        document.getElementById('currentDeviceValue').textContent = currentDevice;

        const recentList = document.getElementById('deviceRecentList');
        recentList.innerHTML = '';
        const recentOnly = snapshot.connected_devices > 0 ? recent.slice(1) : recent;
        if (recentOnly.length === 0) {
          const li = document.createElement('li');
          li.textContent = t('noRecentDevice');
          recentList.appendChild(li);
        } else {
          recentOnly.forEach((item) => {
            const li = document.createElement('li');
            li.textContent = item;
            recentList.appendChild(li);
          });
        }

        const m = snapshot.metrics;
        document.getElementById('debugTx').innerHTML =
          `<div>${t('bufferedMs')}: ${runtimeMetrics.buffered_ms ?? 0}</div>` +
          `<div>${t('captureUnderruns')}: ${runtimeMetrics.underrun ?? 0}</div>` +
          `<div>${t('latePackets')}: ${runtimeMetrics.late_packets ?? 0}</div>` +
          `<div>${t('droppedPackets')}: ${runtimeMetrics.dropped_packets ?? 0}</div>`;

        document.getElementById('debugCapture').innerHTML =
          `<div>${t('rttMs')}: ${runtimeMetrics.rtt_ms ?? 0}</div>` +
          `<div>${t('reconnectCount')}: ${runtimeMetrics.reconnect_count ?? 0}</div>` +
          `<div>${t('decodeErrors')}: ${runtimeMetrics.decode_errors ?? 0}</div>` +
          `<div>${t('sinkWriteGap')}: ${runtimeMetrics.sink_write_gap_ms_p95 ?? 0}</div>`;

        document.getElementById('debugState').innerHTML =
          `<div>${t('serviceStatus')}: ${snapshot.service_status}</div>` +
          `<div>${t('sessionStatus')}: ${runtime.state || snapshot.session_status}</div>` +
          `<div>${t('protocol')}: v${snapshot.protocol_version}</div>` +
          `<div>${t('audioSource')}: ${snapshot.audio_source}</div>` +
          `<div>${t('dataPlane')}: ${runtime.data_plane || snapshot.data_plane_format}</div>` +
          `<div>${t('mode')}: ${runtime.mode || snapshot.current_audio_mode}</div>` +
          `<div>${t('codec')}: ${runtime.effective_codec || snapshot.effective_codec}</div>` +
          `<div>${t('strategy')}: ${JSON.stringify(snapshot.mode_profile || {})}</div>` +
          `<div>service_snapshot: ${JSON.stringify(runtime)}</div>` +
          `<div>capabilities: ${Object.entries(snapshot.capabilities || {}).filter(([, v]) => v).map(([k]) => k).join(', ')}</div>` +
          `<div>${t('captureDevice')}: ${m.capture_device_name}</div>` +
          `<div>${t('sampleRate')}: ${m.capture_sample_rate}</div>` +
          `<div>${t('channels')}: ${m.capture_channels}</div>`;

        const logPane = document.getElementById('logPane');
        logPane.innerHTML = '';
        (snapshot.logs || []).forEach((line) => {
          const div = document.createElement('div');
          div.className = 'log-line';
          div.textContent = formatLogLine(line);
          logPane.appendChild(div);
        });

        const disabled = state.busy;
        document.getElementById('sourceLoopback').disabled = disabled;
        document.getElementById('sourceSynthetic').disabled = disabled;
        document.getElementById('dataPlaneLegacy').disabled = disabled;
        document.getElementById('dataPlaneV2Header').disabled = disabled;
        document.getElementById('codecPcm16').disabled = disabled;
        document.getElementById('codecOpus').disabled = disabled;
        document.getElementById('fallbackToggle').disabled = disabled;
        document.getElementById('safeModeBtn').disabled = disabled;
        document.getElementById('advancedSafeModeBtn').disabled = disabled;
        document.getElementById('dumpToggle').disabled = disabled;
        document.getElementById('copyAddrBtn').disabled = disabled;
        document.getElementById('usbRefreshBtn').disabled = disabled;
        document.getElementById('usbDisableBtn').disabled = disabled || snapshot.transport_mode !== 'usb';
        document.getElementById('exportDiagBtn').disabled = disabled;
        document.getElementById('updateBannerBtn').disabled = disabled || !snapshot.update_banner?.release_url;

        renderUsbPanel(snapshot);
      }

      async function refresh() {
        try {
          await refreshAdbDevices();
          const snapshot = await tauriInvoke('get_desktop_snapshot');
          renderSnapshot(snapshot);
        } catch (error) {
          document.getElementById('errorText').textContent = String(error);
        }
      }

      async function call(command, payload) {
        state.busy = true;
        if (state.snapshot) renderSnapshot(state.snapshot);
        try {
          await tauriInvoke(command, payload);
        } finally {
          state.busy = false;
          await refresh();
        }
      }

      async function applySettings(nextAudioSource = null) {
        if (!state.snapshot) return;
        await call('update_service_settings', {
          settings: {
            audio_source: nextAudioSource || state.snapshot.audio_source,
            data_plane_format:
              document.getElementById('dataPlaneV2Header').classList.contains('active') ? 'v2_header' : 'legacy_las1',
            codec_selection:
              document.getElementById('codecOpus').classList.contains('active') ? 'opus' : 'pcm16',
            allow_loopback_v2_header_gray: false,
            fallback_to_synthetic: document.getElementById('fallbackToggle').checked,
            capture_dump_wav: document.getElementById('dumpToggle').checked,
          }
        });
      }

      async function toggleSafeMode() {
        if (!state.snapshot) return;
        const isSafeMode = state.snapshot.data_plane_format === 'legacy_las1' && state.snapshot.codec_selection === 'pcm16';
        if (isSafeMode) {
          await call('restore_recommended_mode');
          return;
        }
        if (window.confirm(t('rollbackConfirm'))) {
          await call('switch_to_rollback_mode');
        }
      }

      async function copyAddress() {
        if (!state.snapshot) return;
        try {
          await navigator.clipboard.writeText(state.snapshot.connect_address);
          document.getElementById('statusSubline').textContent = t('copied');
        } catch {
          document.getElementById('errorText').textContent = state.snapshot.connect_address;
        }
      }

      async function exportDiagnostics() {
        try {
          const path = await tauriInvoke('export_support_bundle');
          document.getElementById('statusSubline').textContent = trf('exportDiagDone', { path });
        } catch (error) {
          document.getElementById('errorText').textContent = String(error);
        }
      }

      async function openReleasePage() {
        try {
          await tauriInvoke('open_release_page');
        } catch (error) {
          document.getElementById('errorText').textContent = String(error);
        }
      }

      function bindEvents() {
        document.getElementById('langSelect').addEventListener('change', (e) => {
          state.lang = e.target.value;
          renderText();
          if (state.snapshot) renderSnapshot(state.snapshot);
        });

        document.getElementById('primaryActionBtn').addEventListener('click', async () => {
          const action = document.getElementById('primaryActionBtn').dataset.action;
          if (action === 'start') await call('start_service');
          if (action === 'stop') await call('stop_service');
        });

        document.getElementById('sourceLoopback').addEventListener('click', () => applySettings('windows_loopback'));
        document.getElementById('sourceSynthetic').addEventListener('click', () => applySettings('synthetic'));
        document.getElementById('dataPlaneLegacy').addEventListener('click', async () => {
          document.getElementById('dataPlaneLegacy').classList.add('active');
          document.getElementById('dataPlaneV2Header').classList.remove('active');
          document.getElementById('codecPcm16').classList.add('active');
          document.getElementById('codecOpus').classList.remove('active');
          await applySettings();
        });
        document.getElementById('dataPlaneV2Header').addEventListener('click', async () => {
          document.getElementById('dataPlaneLegacy').classList.remove('active');
          document.getElementById('dataPlaneV2Header').classList.add('active');
          await applySettings();
        });
        document.getElementById('codecPcm16').addEventListener('click', async () => {
          document.getElementById('codecPcm16').classList.add('active');
          document.getElementById('codecOpus').classList.remove('active');
          await applySettings();
        });
        document.getElementById('codecOpus').addEventListener('click', async () => {
          document.getElementById('dataPlaneLegacy').classList.remove('active');
          document.getElementById('dataPlaneV2Header').classList.add('active');
          document.getElementById('codecPcm16').classList.remove('active');
          document.getElementById('codecOpus').classList.add('active');
          await applySettings();
        });
        document.getElementById('fallbackToggle').addEventListener('change', () => applySettings());
        document.getElementById('safeModeBtn').addEventListener('click', toggleSafeMode);
        document.getElementById('advancedSafeModeBtn').addEventListener('click', toggleSafeMode);
        document.getElementById('dumpToggle').addEventListener('change', () => applySettings());
        document.getElementById('copyAddrBtn').addEventListener('click', copyAddress);
        document.getElementById('exportDiagBtn').addEventListener('click', exportDiagnostics);
        document.getElementById('updateBannerBtn').addEventListener('click', openReleasePage);
        document.getElementById('usbRefreshBtn').addEventListener('click', async () => {
          await refreshAdbDevices(true);
          await refresh();
        });
        document.getElementById('usbDisableBtn').addEventListener('click', disableUsbMode);
      }

      async function init() {
        document.getElementById('langSelect').value = state.lang;
        renderText();
        bindEvents();
        await refresh();
        setInterval(refresh, 2000);
      }

      init();
    </script>
  </body>
</html>
