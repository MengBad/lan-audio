name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish or rebuild (e.g. v1.4 or v1.3.5)'
        required: true
        type: string
      fixes:
        description: 'Optional bullet list of fixes for this release (one per line)'
        required: false
        type: string
      verified_scope:
        description: 'Optional verified scope summary for the release notes'
        required: false
        type: string
      known_limitations:
        description: 'Optional known limitations summary for the release notes'
        required: false
        type: string
      previous_tag:
        description: 'Optional previous tag for GitHub generated compare range (e.g. v1.3 or v1.3.4)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Validate VERSION matches tag
        id: meta
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          EXPECTED_TAG="v${VERSION}"
          if [ "$EXPECTED_TAG" != "${{ steps.vars.outputs.tag }}" ]; then
            echo "VERSION/tag mismatch: VERSION=$VERSION tag=${{ steps.vars.outputs.tag }}"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Gate release by acceptance contract
        shell: pwsh
        run: |
          $gate = Get-Content -Raw artifacts/release/acceptance_gate.json | ConvertFrom-Json
          if ($gate.force_release_override -eq $true) {
            Write-Warning "FORCE_RELEASE override recorded in acceptance gate; skipping gate enforcement in workflow."
          } else {
            ./scripts/assert_release_gate.ps1
          }

  windows-exe:
    needs: resolve
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build Windows release EXE only
        run: cargo build --release -p lan_audio_desktop

      - name: Collect Windows EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/release/windows | Out-Null
          Copy-Item target/release/lan_audio_desktop.exe "dist/release/windows/lan-audio-desktop-${{ needs.resolve.outputs.tag }}.exe" -Force

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/release/windows/*.exe
          if-no-files-found: error

  android-release:
    needs: resolve
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android_flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Prepare Android local.properties
        run: |
          SHORT_VERSION="$(cat ../../VERSION)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SHORT_VERSION"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((2000000 + MAJOR * 10000 + MINOR * 100 + PATCH))
          printf 'sdk.dir=%s\nflutter.sdk=%s\nflutter.buildMode=release\nflutter.versionName=%s\nflutter.versionCode=%s\n' \
            "$ANDROID_HOME" "$FLUTTER_ROOT" "$SHORT_VERSION" "$VERSION_CODE" > android/local.properties

      - name: Flutter Analyze
        run: flutter analyze

      - name: Decode keystore
        run: |
          echo "${{ secrets.LAN_AUDIO_KEYSTORE_B64 }}" | base64 -d > lan-audio-release.jks
        working-directory: ${{ github.workspace }}

      - name: Build Android release APKs
        env:
          LAN_AUDIO_KEYSTORE_PATH: ${{ github.workspace }}/lan-audio-release.jks
          LAN_AUDIO_KEYSTORE_PASS: ${{ secrets.LAN_AUDIO_KEYSTORE_PASS }}
          LAN_AUDIO_KEY_ALIAS: ${{ secrets.LAN_AUDIO_KEY_ALIAS }}
          LAN_AUDIO_KEY_PASS: ${{ secrets.LAN_AUDIO_KEY_PASS }}
        run: flutter build apk --release --split-per-abi

      - name: Collect Android APKs
        run: |
          mkdir -p ../../dist/release/android
          for apk in build/app/outputs/flutter-apk/*-release.apk; do
            base="$(basename "$apk")"
            abi="${base#app-}"
            abi="${abi%-release.apk}"
            cp "$apk" "../../dist/release/android/lan-audio-android-${abi}-${{ needs.resolve.outputs.tag }}.apk"
          done

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: dist/release/android/*.apk
          if-no-files-found: error

  create-release:
    needs:
      - resolve
      - windows-exe
      - android-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Ensure tag exists for manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags --force
          git rev-parse "${{ needs.resolve.outputs.tag }}" >/dev/null

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: Create checksums
        run: |
          cd dist/release
          find . -type f -not -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Build release notes body
        shell: bash
        run: |
          mkdir -p dist/release

          fixes_input='${{ github.event_name == 'workflow_dispatch' && inputs.fixes || '' }}'
          verified_scope_input='${{ github.event_name == 'workflow_dispatch' && inputs.verified_scope || '' }}'
          known_limitations_input='${{ github.event_name == 'workflow_dispatch' && inputs.known_limitations || '' }}'
          force_override="$(python - <<'PY'
          import json
          from pathlib import Path
          gate = json.loads(Path("artifacts/release/acceptance_gate.json").read_text(encoding="utf-8-sig"))
          print("true" if gate.get("force_release_override") else "false")
          PY
          )"

          {
            echo "## LAN Audio ${{ needs.resolve.outputs.tag }}"
            echo
            echo "- Protocol v2 status: recommended default path remains \`windows_loopback + v2_header + opus\`"
            echo "- Default path: \`windows_loopback + v2_header + opus\`"
            echo "- Rollback path: \`legacy_las1 + pcm16\` (\`--force-rollback\` or UI safe mode)"
            echo "- Codec status: \`opus stable\` on the recommended V2 path"
            if [ "$force_override" = "true" ]; then
              echo "- Release mode: \`FORCE_RELEASE=true\` (manual human-override applied to remaining gate checklist items)"
            fi
            echo

            echo "## What Changed"
            if [ -n "$fixes_input" ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                echo "- $line"
              done <<< "$fixes_input"
            else
              echo "- Audio Console Dark UI redesign with DM Sans and IBM Plex Mono."
              echo "- Latency probe sign-off: low_latency p95 64ms, balanced p95 185ms, high_quality p95 505ms."
              echo "- Android MediaSession, Android/Windows update detection, desktop diagnostics export, balanced buffering optimization, and mode-switch recovery are included."
              echo "- See the generated release notes below for commit and PR details."
            fi
            echo

            echo "## Verified Scope"
            if [ -n "$verified_scope_input" ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                echo "- $line"
              done <<< "$verified_scope_input"
            else
              echo "- Verified device: \`5391d451\` (\`Xiaomi 24129PN74C\`)"
              echo "- Verified scenarios: \`USB + synthetic\`, \`WiFi + windows_loopback\`"
              echo "- Latency probe passed via human-confirmed FORCE_RELEASE evidence: \`low_latency=64ms\`, \`balanced=185ms\`, \`high_quality=505ms\`"
            fi
            echo

            echo "## Known Limitations"
            if [ -n "$known_limitations_input" ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                echo "- $line"
              done <<< "$known_limitations_input"
            else
              echo "- Android runtime and desktop refactor follow-up remains ongoing after \`${{ needs.resolve.outputs.tag }}\`."
              echo "- Rollback path must stay available for diagnostics and controlled fallback."
            fi
            echo

            echo "## Rollback"
            echo "- Desktop CLI: \`--force-rollback\`"
            echo "- Desktop UI: safe mode button"
          } > dist/release/RELEASE_BODY.md

      - name: Publish release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: LAN Audio ${{ needs.resolve.outputs.tag }}
          draft: false
          body_path: dist/release/RELEASE_BODY.md
          generate_release_notes: true
          previous_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.previous_tag || '' }}
          files: |
            dist/release/**/*.exe
            dist/release/**/*.apk
            dist/release/SHA256SUMS.txt
