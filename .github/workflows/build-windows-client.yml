name: Build Windows Client

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-windows-client.yml'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-windows-client.yml'

jobs:
  windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Build Windows Client (Release EXE)
        run: cargo build --release -p lan_audio_desktop

      - name: Collect EXE Artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows-client | Out-Null
          Copy-Item target/release/lan_audio_desktop.exe dist/windows-client/
          Copy-Item apps/desktop/web dist/windows-client/web -Recurse

      - name: Upload Windows Client EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-client-exe
          path: dist/windows-client/**
          if-no-files-found: error

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2'

      - name: Try Build Windows Installer Bundle (MSI/NSIS)
        continue-on-error: true
        run: cargo tauri build --bundles msi,nsis --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Upload Windows Bundle Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-client-bundles
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
