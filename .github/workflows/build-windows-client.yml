name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/build-windows-client.yml'
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/build-windows-client.yml'

jobs:
  windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Build Windows Client (Release EXE)
        run: cargo build --release -p lan_audio_desktop

      - name: Collect EXE Artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows-client | Out-Null
          Copy-Item target/release/lan_audio_desktop.exe dist/windows-client/

      - name: Upload Windows Client EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-client-exe
          path: dist/windows-client/lan_audio_desktop.exe
          if-no-files-found: error
