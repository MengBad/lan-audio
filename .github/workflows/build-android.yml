name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'apps/android_flutter/**'
      - '.cargo/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    paths:
      - 'apps/android_flutter/**'
      - '.cargo/**'
      - '.github/workflows/build-android.yml'

jobs:
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Prepare Android local.properties
        run: |
          SHORT_VERSION="$(cat ../../VERSION)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SHORT_VERSION"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((2000000 + MAJOR * 10000 + MINOR * 100 + PATCH))
          printf 'sdk.dir=%s\nflutter.sdk=%s\nflutter.buildMode=debug\nflutter.versionName=%s\nflutter.versionCode=%s\n' \
            "$ANDROID_HOME" "$FLUTTER_ROOT" "$SHORT_VERSION" "$VERSION_CODE" > android/local.properties

      - name: Flutter Analyze
        run: flutter analyze

      - name: Flutter Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/android_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Flutter Build Release APKs
        run: |
          SHORT_VERSION="$(cat ../../VERSION)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SHORT_VERSION"
          PATCH="${PATCH:-0}"
          VERSION_CODE=$((2000000 + MAJOR * 10000 + MINOR * 100 + PATCH))
          printf 'sdk.dir=%s\nflutter.sdk=%s\nflutter.buildMode=release\nflutter.versionName=%s\nflutter.versionCode=%s\n' \
            "$ANDROID_HOME" "$FLUTTER_ROOT" "$SHORT_VERSION" "$VERSION_CODE" > android/local.properties
          flutter build apk --release --split-per-abi

      - name: Upload Release APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: apps/android_flutter/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
